        - generic [ref=e117]: 6. Build the Reader Route
        - paragraph [ref=e119]: The reader route should fetch verses, render Arabic plus translation, and attach one explanation thread per verse. The user reads first, then asks for help in place.
        - generic [ref=e120]:
          - generic [ref=e121]: src/routes/surah-reader.tsx
          - generic [ref=e123]: "import { useState } from \"react\"; import { useParams } from \"react-router-dom\"; import { useQuery } from \"@tanstack/react-query\"; import { getSurahReaderData } from \"../lib/quran\"; import { askTafseer } from \"../lib/tafseer\"; type ThreadMessage = { role: \"user\" | \"assistant\"; content: string }; type ThreadState = Record<string, ThreadMessage[]>; const TAFSEER_RESOURCE_ID = 169; function threadIdForVerse(verseKey: string) { return `tafseer:${TAFSEER_RESOURCE_ID}:${verseKey}`; } export function SurahReaderRoute() { const { chapterNumber = \"1\" } = useParams(); const [threads, setThreads] = useState<ThreadState>({}); const [loadingVerse, setLoadingVerse] = useState<string | null>(null); const surahQuery = useQuery({ queryKey: [\"surah\", chapterNumber], queryFn: () => getSurahReaderData(Number(chapterNumber)), }); async function submitForVerse(verseKey: string, message: string) { const threadId = threadIdForVerse(verseKey); setLoadingVerse(verseKey); setThreads((current) => ({ ...current, [verseKey]: [...(current[verseKey] ?? []), { role: \"user\", content: message }], })); try { const result = await askTafseer({ resourceId: TAFSEER_RESOURCE_ID, verseKey, message, threadId, }); setThreads((current) => ({ ...current, [verseKey]: [...(current[verseKey] ?? []), { role: \"assistant\", content: result.answer }], })); } finally { setLoadingVerse(null); } } if (surahQuery.isPending) return <p>Loading surah...</p>; if (surahQuery.isError) return <p>Unable to load this surah.</p>; return ( <main> {surahQuery.data.map((verse) => ( <section key={verse.verseKey}> <p>{verse.arabic}</p> <p dangerouslySetInnerHTML={{ __html: verse.translation }} /> <button onClick={() => submitForVerse(verse.verseKey, \"Explain this verse briefly.\")}> {loadingVerse === verse.verseKey ? \"Explaining...\" : \"Explain\"} </button> <ExplanationThread verseKey={verse.verseKey} messages={threads[verse.verseKey] ?? []} onReply={submitForVerse} /> </section> ))} </main> ); }"
