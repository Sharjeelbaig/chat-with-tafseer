        - generic [ref=e59]:
          - article [ref=e60]:
            - 'heading "Route 1: Surah index" [level=3] [ref=e61]'
            - paragraph [ref=e63]: Fetch Quran.com chapters and render a navigable list so the user chooses a surah naturally instead of entering raw identifiers.
          - article [ref=e64]:
            - 'heading "Route 2: Reader + explainer" [level=3] [ref=e65]'
            - paragraph [ref=e67]: Show Arabic ayat and translation on /surah/:chapterNumber. Each verse gets an “Explain” action that calls POST /chat in the background.
        - generic [ref=e68]:
