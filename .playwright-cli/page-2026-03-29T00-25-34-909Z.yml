          - article [ref=e124]:
            - heading "Explicit verse input only" [level=3] [ref=e125]
            - paragraph [ref=e127]: The backend does not infer the verse from free-form user prose. Resolve the verse in your client and send resource_id plus verse_key explicitly.
          - article [ref=e128]:
            - heading "Thread reuse rules" [level=3] [ref=e129]
            - paragraph [ref=e131]: Using the same thread_id on the same verse keeps recent chat history. Reusing that thread on a different verse resets the stored context to the new verse.
